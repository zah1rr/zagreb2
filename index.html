<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0 user-scalable=no"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Slasticarna Zagerb</title>
  </head>
  <body>
    <div class="nav">
      <div class="horizontal">
        <a href="#">Home</a>
        <a href="#">Cups</a>
        <a href="#">Fast Foods</a>
        <a href="#">Ice Creams</a>
        <a href="#">Sweets</a>
        <a href="#">Hot Drinks</a>
        <a href="#">Drinks</a>
      </div>
      <div class="language">
        <details>
          <summary>Language</summary>
          <div class="language-menu">
            <a href="index.html"
              ><img src=" flags/united-kingdom.png" id="language"
            /></a>
            <a href="croatian.html"
              ><img src="flags/croatia.png" id="language"
            /></a>
            <a href="german.html"
              ><img src="flags/germany.png" id="language"
            /></a>
            <a href="italian.html"
              ><img src="flags/italy.png" id="language"
            /></a>
            <a href="czech.html"
              ><img src="flags/czech-republic.png" id="language"
            /></a>
          </div>
        </details>
      </div>
    </div>
    <header>
      <div class="background">
        <h1>Sweet Shop Zagreb</h1>
        <p>Experience the best ice cream and drinks in town!</p>
      </div>
    </header>
    <main>
      <div class="content">
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img
            src="cups pictures/sladolet sa slag.png"
            alt="Ice Cream"
            class="item"
          />
          <div class="desc">
            <h2>Ice cream with cream</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img src="cups pictures/kiviCup.png" alt="Ice Cream" class="item" />
          <div class="desc">
            <h2>Kiwi Cup</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img
            src="cups pictures/strawberrycup.png"
            alt="Ice Cream"
            class="item"
          />
          <div class="desc">
            <h2>Strawberry Cup</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img src="cups pictures/cherrycup.png" alt="Ice Cream" class="item" />
          <div class="desc">
            <h2>Cherry Cup</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img src="cups pictures/mentacup.png" alt="Ice Cream" class="item" />
          <div class="desc">
            <h2>After Eight Cup</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img
            src="cups pictures/vocna salata.png"
            alt="Ice Cream"
            class="item"
          />
          <div class="desc">
            <h2>Fruit Salad</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
        <div class="card" data-aos="fade-up" data-aos-easing="ease-in-out">
          <img src="cups pictures/ananascup.png" alt="Ice Cream" class="item" />
          <div class="desc">
            <h2>Ananas Cup</h2>
            <p id="price">10.00€</p>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
